<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoloMenu Kitchen Display Queue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #07090e;
            --bg-panel: rgba(16, 22, 35, 0.65);
            --border-color: rgba(0, 240, 255, 0.15);
            --glow-blue: #00f0ff;
            --glow-green: #00ff66;
            --glow-orange: #ff9900;
            --font-family: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            background-image:
                linear-gradient(to right, rgba(0, 240, 255, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 240, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            color: #ffffff;
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 30px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .brand {
            display: flex;
            flex-direction: column;
        }

        .brand-h1 {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        .brand-h1 span {
            color: var(--glow-blue);
        }

        .brand-sub {
            font-size: 0.85rem;
            color: #718096;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .queue-stats {
            display: flex;
            gap: 20px;
        }

        .stat-badge {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-count {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--glow-blue);
        }

        .queue-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 25px;
            flex: 1;
            height: calc(100vh - 160px);
            min-height: 500px;
        }

        .queue-column {
            background: var(--bg-panel);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .column-header {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .column-header .badge {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            font-weight: bold;
        }

        #col-confirmed .column-header {
            color: var(--glow-blue);
        }

        #col-cooking .column-header {
            color: var(--glow-orange);
        }

        #col-ready .column-header {
            color: var(--glow-green);
        }

        .order-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            flex: 1;
            padding-right: 5px;
        }

        .order-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: all 0.25s;
        }

        .order-card:hover {
            border-color: rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
            padding-bottom: 8px;
        }

        .order-number {
            font-size: 1.25rem;
            font-weight: 800;
            color: #fff;
        }

        .order-time {
            font-size: 0.8rem;
            color: #718096;
        }

        .order-items {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .order-items li {
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
            color: #cbd5e0;
        }

        .item-qty {
            font-weight: 700;
            color: var(--glow-blue);
            margin-right: 6px;
        }

        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }

        .order-total {
            font-size: 0.9rem;
            font-weight: 600;
            color: #a0aec0;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .btn-cook {
            border-color: var(--glow-orange);
            color: var(--glow-orange);
        }

        .btn-cook:hover {
            background: rgba(255, 153, 0, 0.1);
            box-shadow: 0 0 10px rgba(255, 153, 0, 0.2);
        }

        .btn-ready {
            border-color: var(--glow-green);
            color: var(--glow-green);
        }

        .btn-ready:hover {
            background: rgba(0, 255, 102, 0.1);
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.2);
        }

        .btn-complete {
            border-color: var(--glow-blue);
            color: var(--glow-blue);
            flex: 1;
        }

        .btn-complete:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .btn-cancel {
            border-color: #ff0055;
            color: #ff0055;
            padding: 8px 12px;
        }

        .btn-cancel:hover {
            background: rgba(255, 0, 85, 0.1);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: #4a5568;
            text-align: center;
            gap: 10px;
        }

        .empty-icon {
            font-size: 2.5rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>

    <header>
        <div class="brand">
            <h1 class="brand-h1">HoloMenu <span>Kitchen</span></h1>
            <div class="brand-sub">Active Order Flow Queue</div>
        </div>
        <div class="queue-stats">
            <div class="stat-badge">
                <span>Pending:</span>
                <span id="stat-pending" class="stat-count">0</span>
            </div>
            <div class="stat-badge">
                <span>Cooking:</span>
                <span id="stat-cooking" class="stat-count">0</span>
            </div>
            <div class="stat-badge">
                <span>Ready:</span>
                <span id="stat-ready" class="stat-count">0</span>
            </div>
        </div>
    </header>

    <main class="queue-grid">
        <!-- COLUMN 1: CONFIRMED -->
        <section class="queue-column" id="col-confirmed">
            <h2 class="column-header">
                Confirmed / New <span class="badge" id="badge-confirmed">0</span>
            </h2>
            <div class="order-list" id="list-confirmed">
                <!-- Rendered via JS -->
            </div>
        </section>

        <!-- COLUMN 2: COOKING -->
        <section class="queue-column" id="col-cooking">
            <h2 class="column-header">
                Cooking <span class="badge" id="badge-cooking">0</span>
            </h2>
            <div class="order-list" id="list-cooking">
                <!-- Rendered via JS -->
            </div>
        </section>

        <!-- COLUMN 3: READY -->
        <section class="queue-column" id="col-ready">
            <h2 class="column-header">
                Ready for Pickup <span class="badge" id="badge-ready">0</span>
            </h2>
            <div class="order-list" id="list-ready">
                <!-- Rendered via JS -->
            </div>
        </section>
    </main>

    <script src="assets/js/api-client.js"></script>
    <script>
        async function fetchOrders() {
            try {
                const orders = await HoloApi.getChefOrders();
                renderQueue(orders);
            } catch (err) {
                console.error('Failed to load kitchen queue:', err);
            }
        }

        async function updateStatus(orderId, newStatus) {
            try {
                await HoloApi.updateOrderStatus(orderId, newStatus);
                fetchOrders(); // reload
            } catch (err) {
                console.error(`Error updating order status to ${newStatus}:`, err);
            }
        }

        function formatTime(timestampString) {
            // Local time format (hh:mm AMv/PM)
            const date = new Date(timestampString);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function renderQueue(orders) {
            const lists = {
                confirmed: document.getElementById('list-confirmed'),
                cooking: document.getElementById('list-cooking'),
                ready: document.getElementById('list-ready')
            };

            const counts = { confirmed: 0, cooking: 0, ready: 0 };

            // Clear lists
            Object.keys(lists).forEach(key => lists[key].innerHTML = '');

            orders.forEach(order => {
                const status = order.status; // 'confirmed', 'cooking', 'ready'
                if (!lists[status]) return;

                counts[status]++;

                const card = document.createElement('div');
                card.className = 'order-card';

                // Header
                const header = document.createElement('div');
                header.className = 'order-header';
                header.innerHTML = `
          <span class="order-number">Order #${order.id}</span>
          <span class="order-time">${formatTime(order.started_at)}</span>
        `;
                card.appendChild(header);

                // Items List
                const itemsList = document.createElement('ul');
                itemsList.className = 'order-items';
                order.items.forEach(item => {
                    const li = document.createElement('li');
                    li.innerHTML = `
            <span><span class="item-qty">${item.quantity}x</span>${item.name_en}</span>
            <span style="font-size:0.75rem; color:#718096">${item.name_ar}</span>
          `;
                    itemsList.appendChild(li);
                });
                card.appendChild(itemsList);

                // Footer Action Panel
                const footer = document.createElement('div');
                footer.className = 'order-footer';

                const total = document.createElement('span');
                total.className = 'order-total';
                total.textContent = `${order.total_price} EGP`;
                footer.appendChild(total);

                // Button action routing
                const btnGroup = document.createElement('div');
                btnGroup.style.display = 'flex';
                btnGroup.style.gap = '8px';

                if (status === 'confirmed') {
                    const cookBtn = document.createElement('button');
                    cookBtn.className = 'action-btn btn-cook';
                    cookBtn.textContent = 'Cook';
                    cookBtn.onclick = () => updateStatus(order.id, 'cooking');
                    btnGroup.appendChild(cookBtn);
                } else if (status === 'cooking') {
                    const readyBtn = document.createElement('button');
                    readyBtn.className = 'action-btn btn-ready';
                    readyBtn.textContent = 'Ready';
                    readyBtn.onclick = () => updateStatus(order.id, 'ready');
                    btnGroup.appendChild(readyBtn);
                } else if (status === 'ready') {
                    const doneBtn = document.createElement('button');
                    doneBtn.className = 'action-btn btn-complete';
                    doneBtn.textContent = 'Done & Serve';
                    doneBtn.onclick = () => updateStatus(order.id, 'completed');
                    btnGroup.appendChild(doneBtn);
                }

                // Cancel order button
                const cancelBtn = document.createElement('button');
                cancelBtn.className = 'action-btn btn-cancel';
                cancelBtn.textContent = '✕';
                cancelBtn.title = 'Void Order';
                cancelBtn.onclick = () => {
                    if (confirm(`Void Order #${order.id}?`)) {
                        updateStatus(order.id, 'cancelled');
                    }
                };
                btnGroup.appendChild(cancelBtn);

                footer.appendChild(btnGroup);
                card.appendChild(footer);
                lists[status].appendChild(card);
            });

            // Update counters
            document.getElementById('stat-pending').textContent = counts.confirmed;
            document.getElementById('stat-cooking').textContent = counts.cooking;
            document.getElementById('stat-ready').textContent = counts.ready;

            document.getElementById('badge-confirmed').textContent = counts.confirmed;
            document.getElementById('badge-cooking').textContent = counts.cooking;
            document.getElementById('badge-ready').textContent = counts.ready;

            // Handle empty columns
            Object.keys(lists).forEach(key => {
                if (lists[key].children.length === 0) {
                    lists[key].innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">☕</div>
              <div>No orders here</div>
            </div>
          `;
                }
            });
        }

        // Poll every 3 seconds
        setInterval(fetchOrders, 3000);
        window.onload = fetchOrders;
    </script>
    <script src="nav.js"></script>
    <script>HoloNav.init('chef');</script>
</body>

</html>
